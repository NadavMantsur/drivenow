apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: drivenow
type: Opaque
stringData:
  # Demo credentials only — replace for any non-local environment.
  POSTGRES_USER: drivenow
  POSTGRES_PASSWORD: drivenow
  DATABASE_URL_FLEET: postgresql+psycopg2://drivenow:drivenow@postgres:5432/fleet_db
  DATABASE_URL_RENTAL: postgresql+psycopg2://drivenow:drivenow@postgres:5432/rental_db
